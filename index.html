<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f9fafb" />
  <title>AI试纸 · Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['-apple-system', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', 'sans-serif'] },
          colors: {
            ios: { blue: '#007AFF', green: '#34C759', orange: '#FF9500', purple: '#5856D6' },
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: -apple-system, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%); min-height: 100vh; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .fade-in-delay-1 { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both; }
    .fade-in-delay-2 { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both; }
    textarea { -webkit-appearance: none; resize: none; }
    .glass-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
    .sample-chip { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .sample-chip:active { transform: scale(0.96); }
    .btn-active { transform: scale(0.98); }
    .gradient-text { background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-[430px] mx-auto min-h-screen px-6 py-8 flex flex-col" id="app">

    <!-- 引导页 -->
    <div id="introView" class="flex-1 flex flex-col justify-center items-center text-center fade-in">
      <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-ios-blue to-ios-purple flex items-center justify-center shadow-xl shadow-blue-500/30 mb-8">
        <svg viewBox="0 0 24 24" class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="3" width="15" height="13"></rect>
          <path d="M16 8v5a6 6 0 0 0 6 6h0a6 6 0 0 0 0-12h-0a6 6 0 0 0-6 6"></path>
          <circle cx="5.5" cy="18.5" r="2.5"></circle>
          <circle cx="18.5" cy="18.5" r="2.5"></circle>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-3">AI试纸</h1>
      <p class="text-gray-500 text-sm max-w-[280px] leading-relaxed mb-8">
        测测你的需求该用什么实现，告别"AI万能论"，选对技术方案
      </p>
      <div class="grid grid-cols-2 gap-3 w-full max-w-[280px] mb-8">
        <div class="bg-white/60 backdrop-blur-sm rounded-2xl p-4 border border-gray-100">
          <div class="text-2xl font-bold text-ios-green mb-1">4档</div>
          <div class="text-xs text-gray-400">技术分类</div>
        </div>
        <div class="bg-white/60 backdrop-blur-sm rounded-2xl p-4 border border-gray-100">
          <div class="text-2xl font-bold text-ios-blue mb-1">20+</div>
          <div class="text-xs text-gray-400">行业场景</div>
        </div>
      </div>
      <button id="startBtn" class="w-full max-w-[280px] py-4 rounded-2xl bg-gray-900 text-white font-semibold shadow-lg shadow-gray-900/20 active:scale-[0.98] transition-all">
        开始测试
      </button>
    </div>

    <!-- 输入态 -->
    <div id="inputView" class="flex-1 flex flex-col hidden">
      <!-- 顶部返回栏 -->
      <div class="flex items-center -mx-2 mb-6">
        <button id="backBtn" class="w-10 h-10 flex items-center justify-center rounded-full text-gray-600 hover:bg-gray-100 transition-colors">
          <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <span class="text-sm font-medium text-gray-700 ml-1">描述你的需求</span>
      </div>

      <div class="flex-1 flex flex-col">
        <!-- 输入卡片 -->
        <div class="glass-card rounded-3xl p-6 shadow-lg shadow-gray-200/50">
          <textarea id="requirement" rows="4"
            placeholder="描述你的需求..."
            class="w-full text-base bg-transparent outline-none placeholder-gray-300 text-gray-800 leading-relaxed"></textarea>
          <div id="hint" class="text-xs text-gray-400 mt-2 h-4"></div>
        </div>

        <!-- 滴一下按钮 -->
        <button id="submitBtn" disabled
          class="w-full mt-4 py-4 rounded-2xl text-white text-base font-semibold transition-all active:scale-[0.98] disabled:bg-gray-200 disabled:text-gray-400 disabled:active:scale-100 bg-gray-900 shadow-lg shadow-gray-900/20">
          滴一下
        </button>

        <!-- 预置样例 -->
        <div class="mt-6">
          <div class="flex items-center justify-between mb-4">
            <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">场景样例</span>
            <span class="text-xs text-gray-400">点击快速体验</span>
          </div>

          <!-- 样例列表 -->
          <div id="sampleList" class="grid grid-cols-1 gap-3"></div>
        </div>
      </div>
    </div>

    <!-- Loading 态 -->
    <div id="loadingView" class="hidden flex-1 flex flex-col items-center justify-center">
      <div class="relative">
        <div class="w-16 h-16 rounded-full bg-gradient-to-br from-ios-blue to-ios-purple animate-pulse"></div>
        <div class="absolute inset-0 w-16 h-16 rounded-full bg-gradient-to-br from-ios-blue to-ios-purple animate-ping opacity-30"></div>
        <div class="absolute inset-0 flex items-center justify-center">
          <svg viewBox="0 0 24 24" class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="3" width="15" height="13"></rect>
            <path d="M16 8v5a6 6 0 0 0 6 6h0a6 6 0 0 0 0-12h-0a6 6 0 0 0-6 6"></path>
          </svg>
        </div>
      </div>
      <p class="text-gray-500 mt-6 text-sm font-medium">试纸反应中…</p>
    </div>

    <!-- 结果态 -->
    <div id="resultView" class="hidden flex-1 overflow-y-auto -mx-2 px-2"></div>
  </div>

  <script>
    // ====== 预置样例数据（覆盖各行各业） ======
    const SAMPLES = [
      // ===== 规则条件档 =====
      {

        result: {
          category: '规则条件',

          antiReason: '用 AI 反而更贵、更不稳定、更难审计。规则一旦确定就很少变化，用 AI 没有收益。',
          examples: ['金融：金额>50万需二级审批', '零售：库存低于安全线自动预警', '风控：黑名单用户自动拦截'],
          knowledgeCards: [
            { title: '规则引擎', description: '把业务规则从代码里抽出来集中管理，非技术人员也能改规则，不用每次都要研发排期。' },
            { title: '为什么不用 AI？', description: '规则明确、变化少的场景，AI 的"智能"是多余的。就像你不会用导航去找自家冰箱的位置。' },
          ],
        },
      },
      {

          antiReason: 'AI 判断贷款审批无法解释原因，监管要求"可解释"。规则引擎每一步都可追溯，符合合规要求。',
          examples: ['银行：信用分<600拒贷', '保险：年龄>65岁加费', '电商：新用户首单限额'],
          knowledgeCards: [
            { title: '可解释性', description: '金融监管要求每个拒贷决定都能说明原因。AI 是"黑盒"，规则是"白盒"，监管更爱白盒。' },
            { title: '规则引擎 vs AI', description: '规则引擎像红绿灯：简单、确定、人人能懂。AI 像老司机：灵活但说不清为什么这么开。场景选对才有效。' },
          ],
        },
      },
      {
        requirement: '工厂设备温度超过80度自动报警停机',

          reason: '工业安全的典型阈值监控：温度 > 80°C → 报警。固定阈值、即时触发，规则条件即可。',
          antiReason: 'AI 预测需要历史数据训练，而安全报警要求毫秒级响应、零误判。规则比 AI 更快、更可靠。',

          knowledgeCards: [

            { title: '阈值管理', description: '不同设备、不同工况阈值不同。好的规则系统支持动态调整阈值，适应季节、负载变化。' },
          ],
        },
      },

        },
      },
      {

        },
      },
      {

        },
      },
      // ===== 小模型/机器学习档 =====
      {
        requirement: '根据历史销量预测下个月各商品的销售量',

            { title: '特征工程', description: '把原始数据加工成模型能理解的信号。比如从"日期"提取"是否周末""是否节假日"，模型就能抓住周期规律。' },

          antiReason: '用大模型做质检成本高、延迟大。专用的视觉小模型（如 ResNet、YOLO）在准确率、速度、成本上全面碾压。',

            { title: 'CNN（卷积神经网络）', description: '专门处理图像的神经网络，通过卷积核"扫描"图像特征。像人眼从局部到整体识别物体的过程。' },
            { title: '迁移学习', description: '拿别人训练好的模型"微调"成自己的任务。就像转行不用从小学重读，只学新领域的知识就行。' },

          antiReason: '大模型无法处理百万级用户的批量预测，且每次调用成本高。小模型一次训练即可批量预测，成本可忽略。',

            { title: '特征重要性', description: '模型告诉你哪些因素最影响流失。比如"30天未登录"比"性别"重要100倍，运营就知道该重点做什么。' },

          antiReason: '大模型无法支撑亿级商品的实时推荐。专用推荐模型（如双塔、DIN）能在 50ms 内从百万商品中筛出 Top10。',
          examples: ['电商：商品个性化推荐', '视频：内容信息流推荐', '音乐：每日推荐歌单'],

            { title: '协同过滤', description: '"喜欢相似商品的人会喜欢相似的东西"。最早的推荐算法，原理简单但至今有效，亚马逊靠它起家。' },

        },
      },
      // ===== AI/大模型档 =====
      {

        result: {

    // ====== 匹配逻辑 ======
    function matchSample(req) {
      // 精确匹配
      const exact = SAMPLES.find(s => s.requirement === req.trim());
      if (exact) return exact.result;

      // 关键词模糊匹配
      const keywords = {
        '规则条件': ['审批', '阈值', '规则', '条件', '黑名单', '预警', '过滤', '金额'],
        '工作流': ['流程', '步骤', '流水线', '定时', '汇总', '报表', '流转', '入职'],
        '小模型/机器学习': ['预测', '销量', '分类', '评分', '推荐', 'churn', '流失', '图像识别'],
        'AI/大模型': ['理解', '对话', '生成', '摘要', '情感', '客服', '写作', '多模态'],
      };

      const lowerReq = req.toLowerCase();
      let bestMatch = null;
      let bestScore = 0;

      for (const [cat, kws] of Object.entries(keywords)) {
        let score = 0;
        for (const kw of kws) {
          if (lowerReq.includes(kw.toLowerCase())) score++;
        }
        if (score > bestScore) { bestScore = score; bestMatch = cat; }
      }

      if (bestScore === 0) return null;

      // 找到匹配档位的第一个样例作为模板
      const template = SAMPLES.find(s => s.result.category === bestMatch);
      if (template) {
        return {
          category: bestMatch,
          reason: `根据你的需求描述，识别到"${bestMatch}"相关的特征关键词。${template.result.reason}`,
          antiReason: template.result.antiReason,
          examples: template.result.examples,
          knowledgeCards: template.result.knowledgeCards,
          isAmbiguous: true,
        };
      }
      return null;
    }

    function analyze(isSample) {
      const requirement = textarea.value.trim();
      if (requirement.length < 5) return;

      showView('loading');

      // 模拟"思考"延迟，让 demo 有仪式感
      const delay = isSample ? 800 : 600;
      setTimeout(() => {
        const result = matchSample(requirement);
        if (result) {
          renderResult(result, requirement);
          showView('result');
        } else {
          renderNoMatch(requirement);
          showView('result');
        }
      }, delay);
    }

        return `
          <div class="flex items-center gap-3 p-3 rounded-xl bg-gray-50">
            <div class="text-xs font-medium px-2 py-1 rounded-md bg-white border border-gray-200 text-gray-600">${escapeHTML(domain)}</div>
            <span class="text-sm text-gray-700 flex-1">${escapeHTML(scene || domain)}</span>
          </div>
        `;
      }).join('');

      const pathHTML = (cfg.path || []).map((step, i) => `
        <div class="flex items-center gap-3">
          <div class="w-5 h-5 rounded-full ${cfg.bg} flex items-center justify-center text-white text-xs font-bold shrink-0">${i + 1}</div>
          <span class="text-sm text-gray-700">${escapeHTML(step)}</span>
          ${i < cfg.path.length - 1 ? '<div class="w-2 h-0.5 bg-gray-200 ml-[-4px]"></div>' : ''}
        </div>
      `).join('');

      views.result.innerHTML = `
        <div class="space-y-5 pb-8">
          <div class="flex items-center -mx-2">
            <button id="resultBackBtn" class="w-10 h-10 flex items-center justify-center rounded-full text-gray-600 hover:bg-gray-100 transition-colors">
              <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
            <span class="text-sm font-medium text-gray-700 ml-1">检测结果</span>
          </div>

          <div class="${cfg.light} rounded-3xl p-6 text-center fade-in">
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">建议实现方式</div>
            <div class="text-2xl font-bold ${cfg.text}">${escapeHTML(data.category)}</div>
            ${data.isAmbiguous ? '<div class="text-xs text-gray-400 mt-2">基于关键词匹配，仅供参考</div>' : ''}
          </div>

          <div class="bg-white/60 rounded-2xl p-4 border border-gray-100 backdrop-blur-sm">
            <div class="text-xs text-gray-400 font-medium mb-1">你的需求</div>
            <div class="text-sm text-gray-700 leading-relaxed">${escapeHTML(originalReq)}</div>
          </div>

          <div class="bg-white rounded-3xl p-5 shadow-sm border ${cfg.border} fade-in-delay-1">
            <div class="flex items-center gap-2 mb-2.5">
              <div class="w-1 h-4 ${cfg.bg} rounded-full"></div>
              <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">为什么是这一档</span>
            </div>
            <div class="text-gray-700 leading-relaxed text-sm">${escapeHTML(data.reason || '')}</div>
          </div>

          <div class="bg-gray-900 rounded-3xl p-5 fade-in-delay-2">
            <div class="flex items-center gap-2 mb-2.5">
              <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">💡 为什么不用更高档</span>
            </div>
            <div class="text-gray-300 leading-relaxed text-sm">${escapeHTML(data.antiReason || '')}</div>
          </div>

          ${examplesHTML ? `
          <div class="fade-in-delay-2">
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">典型场景</div>
            <div class="space-y-2">${examplesHTML}</div>
          </div>` : ''}

          <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 fade-in-delay-2">
            <div class="flex items-center gap-2 mb-3">
              <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">🚀 实现路径</span>
            </div>
            <div class="space-y-3">${pathHTML}</div>
          </div>

          ${cardsHTML ? `
          <div>
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">聊到这 · 顺道学点</div>
            <div class="space-y-3">${cardsHTML}</div>
          </div>` : ''}

          ${renderLearningSection(cfg)}

          <button id="retryBtn2" class="w-full py-4 rounded-2xl bg-gray-900 text-white text-base font-semibold shadow-md shadow-gray-900/10 active:scale-[0.98] mt-2">
            再试一次
          </button>
        </div>
      `;

      $('resultBackBtn').addEventListener('click', () => {
        showView('input');
      });

      $('retryBtn2').addEventListener('click', () => {
        textarea.value = '';
        submitBtn.disabled = true;
        hint.textContent = '';
        showView('input');
      });

      // 绑定 quiz 交互（事件委托）
      views.result.querySelectorAll('.quiz-option').forEach(btn => {
        btn.addEventListener('click', () => {
          const quiz = btn.closest('.quiz-card');
          if (quiz.dataset.answered === '1') return;
          const selectedIdx = +btn.dataset.idx;
          const correctIdx = +quiz.dataset.correct;
          const explain = quiz.querySelector('.quiz-explain');
          const options = quiz.querySelectorAll('.quiz-option');

          if (selectedIdx === correctIdx) {
            btn.classList.add('bg-green-50', 'border-ios-green', 'text-ios-green');
            btn.querySelector('.quiz-mark').textContent = '✓';
            btn.querySelector('.quiz-mark').classList.add('text-ios-green');
          } else {
            btn.classList.add('bg-red-50', 'border-red-300', 'text-red-600');
            btn.querySelector('.quiz-mark').textContent = '✗';
            btn.querySelector('.quiz-mark').classList.add('text-red-500');
            // 高亮正确答案
            options[correctIdx].classList.add('bg-green-50', 'border-ios-green', 'text-ios-green');
            options[correctIdx].querySelector('.quiz-mark').textContent = '✓';
            options[correctIdx].querySelector('.quiz-mark').classList.add('text-ios-green');
          }

          explain.classList.remove('hidden');
          quiz.dataset.answered = '1';
        });
      });
    }

    // 渲染学习区块：打个比方 + 小试一下
    function renderLearningSection(cfg) {
      const learning = cfg.learning;
      if (!learning) return '';

      const quizHTML = (learning.quiz || []).map((item, i) => {
        const optionsHTML = item.options.map((opt, idx) => `
          <button class="quiz-option w-full text-left px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm text-gray-700 transition-all active:scale-[0.99] hover:border-gray-300 flex items-center justify-between" data-idx="${idx}">
            <span>${escapeHTML(opt)}</span>
            <span class="quiz-mark w-5 h-5 flex items-center justify-center text-sm font-bold"></span>
          </button>
        `).join('');

        return `
          <div class="quiz-card bg-white rounded-2xl p-5 border border-gray-100 shadow-sm" data-correct="${item.answerIdx}" data-answered="0">
            <div class="flex items-start gap-2 mb-3">
              <span class="text-xs font-bold ${cfg.text} ${cfg.light} px-2 py-0.5 rounded-md">Q${i + 1}</span>
              <div class="text-sm font-medium text-gray-800 leading-relaxed flex-1">${escapeHTML(item.q)}</div>
            </div>
            <div class="space-y-2">${optionsHTML}</div>
            <div class="quiz-explain hidden mt-3 p-3 rounded-xl ${cfg.light} text-xs text-gray-600 leading-relaxed">
              <span class="font-semibold ${cfg.text}">解析：</span>${escapeHTML(item.explain)}
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="space-y-3 fade-in-delay-2">
          <!-- 打个比方 -->
          <div class="bg-gradient-to-br from-gray-900 to-gray-800 rounded-3xl p-5 text-white">
            <div class="flex items-center gap-2 mb-2.5">
              <span class="text-sm">🎯</span>
              <span class="text-xs font-semibold text-gray-300 uppercase tracking-wider">打个比方</span>
            </div>
            <div class="text-sm leading-relaxed text-gray-100">${escapeHTML(learning.analogy)}</div>
          </div>

          <!-- 小试一下 -->
          <div>
            <div class="flex items-center justify-between mb-3">
              <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">✨ 小试一下</span>
              <span class="text-xs text-gray-400">点击选项即出答案</span>
            </div>
            <div class="space-y-3">${quizHTML}</div>
          </div>
        </div>
      `;
    }

    function renderNoMatch(originalReq) {
      views.result.innerHTML = `
        <div class="space-y-5 pb-8 fade-in">
          <div class="flex items-center -mx-2">
            <button id="resultBackBtn2" class="w-10 h-10 flex items-center justify-center rounded-full text-gray-600 hover:bg-gray-100 transition-colors">
              <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
            <span class="text-sm font-medium text-gray-700 ml-1">检测结果</span>
          </div>

          <div class="bg-gray-50 rounded-3xl p-8 text-center">
            <div class="text-4xl mb-4">🤔</div>
            <div class="text-lg font-semibold text-gray-700">这条需求没匹配到样例</div>
            <div class="text-sm text-gray-500 mt-2">试试下方的预置样例</div>
          </div>

          <div class="bg-white/60 rounded-2xl p-4 border border-gray-100 backdrop-blur-sm">
            <div class="text-xs text-gray-400 font-medium mb-1">你的需求</div>
            <div class="text-sm text-gray-700">${escapeHTML(originalReq)}</div>
          </div>

          <div>
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">热门场景</div>
            <div class="grid grid-cols-2 gap-2">
              ${SAMPLES.slice(0, 6).map((s, i) => {
                const cfg = CATEGORY_CONFIG[s.result.category];
                return `
                  <button class="text-left p-3 bg-white rounded-xl border border-gray-100 hover:border-gray-200 text-xs transition-all" data-idx="${i}">
                    <div class="font-medium text-gray-800 line-clamp-2 leading-relaxed">${escapeHTML(s.requirement)}</div>
                    <div class="flex items-center gap-1 mt-1.5">
                      <div class="w-1 h-1 rounded-full ${cfg.dot}"></div>
                      <span class="text-xs text-gray-400">${escapeHTML(s.result.category)}</span>
                    </div>
                  </button>
                `;
              }).join('')}
            </div>
          </div>

          <button id="retryBtn3" class="w-full py-4 rounded-2xl bg-gray-900 text-white text-base font-semibold shadow-lg shadow-gray-900/20 active:scale-[0.98]">
            重新输入
          </button>
        </div>
      `;

      views.result.querySelectorAll('[data-idx]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          textarea.value = SAMPLES[idx].requirement;
          textarea.dispatchEvent(new Event('input'));
          showView('input');
          submitBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      });

      $('resultBackBtn2').addEventListener('click', () => {
        showView('input');
      });

      $('retryBtn3').addEventListener('click', () => {
        textarea.value = '';
        submitBtn.disabled = true;
        hint.textContent = '';
        showView('input');
      });
    }

    showView('intro');
  </script>
</body>
</html>
